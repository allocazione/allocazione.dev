<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="author" content="Sel" />
		<meta name="keywords" content="cybersecurity, malware research, security, low-level, C, Rust, Go, Python" />

		<!-- Primary Meta Tags -->
		<meta name="title" content="allocazione.dev — security & systems research" />
		<meta name="description" content="Cybersecurity researcher and low-level systems developer." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://allocazione.dev" />
		<meta property="og:title" content="allocazione.dev — security & systems research" />
		<meta property="og:description" content="Cybersecurity researcher and low-level systems developer." />
		<meta property="og:image" content="https://github.com/allocazione.png" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:site_name" content="allocazione.dev" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://allocazione.dev" />
		<meta name="twitter:title" content="allocazione.dev — security & systems research" />
		<meta name="twitter:description" content="Cybersecurity researcher and low-level systems developer." />
		<meta name="twitter:image" content="https://github.com/allocazione.png" />
		<meta name="twitter:site" content="@seleneftw" />
		<meta name="twitter:creator" content="@seleneftw" />
		
		<!-- Preconnect and Asynchronous Font Loading -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap">
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap" media="print" onload="this.media='all'">
		<noscript>
			<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap">
		</noscript>

		<!-- Canonical URL -->
		<link rel="canonical" href="https://allocazione.dev" />

		%sveltekit.head%
		<style>
			:root {
				--accent: %accent%;
				--accent-rgb: %accent_rgb%;
			}
		</style>
		<script>
			(function() {
				const getCookie = (name) => {
					const value = `; ${document.cookie}`;
					const parts = value.split(`; ${name}=`);
					if (parts.length === 2) return parts.pop().split(";").shift();
					return null;
				};
				const hexToRgbStr = (hex) => {
					const cleanHex = decodeURIComponent(hex).replace('#', '');
					if (cleanHex.length < 6) return '225, 102, 102';
					const r = parseInt(cleanHex.slice(0, 2), 16);
					const g = parseInt(cleanHex.slice(2, 4), 16);
					const b = parseInt(cleanHex.slice(4, 6), 16);
					return `${r}, ${g}, ${b}`;
				};
				const savedColor = getCookie('accent_color');
				if (savedColor) {
					const color = decodeURIComponent(savedColor);
					document.documentElement.style.setProperty('--accent', color);
					document.documentElement.style.setProperty('--accent-rgb', hexToRgbStr(color));
				}
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover" class="antialiased bg-bg-dark text-text-soft">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
