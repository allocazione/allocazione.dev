<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#b2b2b2" />
		<meta name="author" content="Sel" />
		<meta name="keywords" content="cybersecurity, malware research, security, low-level, C, Rust, Go, Python" />
		<meta name="darkreader-lock" content="true" />
 
		<!-- Primary Meta Tags -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://allocazione.dev" />
		<meta property="og:image" content="https://github.com/allocazione.png" />
		<meta property="og:locale" content="en_US" />

 
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:url" content="https://allocazione.dev" />
		<meta name="twitter:image" content="https://github.com/allocazione.png" />
		<meta name="twitter:site" content="@seleneftw" />
		<meta name="twitter:creator" content="@seleneftw" />
		
		<!-- Preconnect and Font Loading (Static & Local) -->
		<link rel="preload" as="font" type="font/woff2" href="%sveltekit.assets%/fonts/inter-400.woff2" crossorigin="anonymous">
		<link rel="preload" as="font" type="font/woff2" href="%sveltekit.assets%/fonts/space-mono-400.woff2" crossorigin="anonymous">
		<link rel="stylesheet" href="%sveltekit.assets%/fonts.css">
		<!-- Canonical URL -->
		<link rel="canonical" href="https://allocazione.dev" />

		%sveltekit.head%
		<style>
			:root {
				--accent: %accent%;
				--accent-rgb: %accent_rgb%;
			}
		</style>
		<script>
			(function() {
				const getCookie = (name) => {
					const value = `; ${document.cookie}`;
					const parts = value.split(`; ${name}=`);
					if (parts.length === 2) return parts.pop().split(";").shift();
					return null;
				};
				const hexToRgbStr = (hex) => {
					const cleanHex = decodeURIComponent(hex).replace('#', '');
					if (cleanHex.length < 6) return '225, 102, 102';
					const r = parseInt(cleanHex.slice(0, 2), 16);
					const g = parseInt(cleanHex.slice(2, 4), 16);
					const b = parseInt(cleanHex.slice(4, 6), 16);
					return `${r}, ${g}, ${b}`;
				};
				const savedColor = getCookie('accent_color');
				if (savedColor) {
					const color = decodeURIComponent(savedColor);
					document.documentElement.style.setProperty('--accent', color);
					document.documentElement.style.setProperty('--accent-rgb', hexToRgbStr(color));
				}
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover" class="antialiased bg-bg-dark text-text-soft">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
